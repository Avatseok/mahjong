<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>測試連線 - 雀王爭霸戰</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-10">

    <h1 class="text-3xl font-bold mb-5">🀄️ 數據連線測試</h1>
    
    <div id="status" class="p-4 rounded bg-slate-800 border border-slate-700 mb-5">
        正在連線到 Google Sheet...
    </div>

    <div id="testList" class="space-y-2"></div>

    
<body class="p-4 md:p-8 bg-[#064e3b]">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-5xl md:text-7xl font-black text-[#fdfbf7] drop-shadow-[4px_4px_0px_#b91c1c]">🀄️ 雀王爭霸戰 🀄️</h1>
        </header>

        <nav class="flex flex-wrap justify-center gap-3 mb-10">
            <button class="nav-btn active bg-[#fdfbf7] text-[#064e3b] px-6 py-3 rounded-xl font-black" onclick="switchTab('tab1', this)">龍虎榜</button>
            <button class="nav-btn bg-emerald-800 text-white px-6 py-3 rounded-xl font-black" onclick="switchTab('tab2', this)">名人堂</button>
        </nav>

        <div id="tab1" class="tab-content">
            <div class="flex justify-center gap-2 mb-8">
                <button class="px-4 py-2 rounded-full bg-emerald-900 text-white text-xs font-bold" onclick="renderRank('all')">總排名</button>
                <button class="px-4 py-2 rounded-full bg-emerald-800 text-white text-xs font-bold" onclick="renderRank('2026')">2026</button>
            </div>
            
            <div class="bg-[#fdfbf7] rounded-xl overflow-hidden shadow-2xl border-b-4 border-r-4 border-gray-300">
                <div id="rankContainer" class="divide-y divide-gray-100">
                    <p class="p-10 text-center text-gray-400">準備開檯...</p>
                </div>
            </div>
        </div>

        <div id="tab2" class="tab-content hidden text-white text-center">
            <p>名人堂裝修中...</p>
        </div>
    </div>

   
<body class="p-4 md:p-8 bg-[#064e3b]">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-5xl md:text-7xl font-black text-[#fdfbf7] drop-shadow-[4px_4px_0px_#b91c1c]">🀄️ 雀王爭霸戰 🀄️</h1>
        </header>

        <nav class="flex flex-wrap justify-center gap-3 mb-10">
            <button id="btn-tab1" class="nav-btn bg-[#fdfbf7] text-[#064e3b] px-6 py-3 rounded-xl font-black shadow-lg" onclick="switchTab('tab1')">龍虎榜</button>
            <button id="btn-tab2" class="nav-btn bg-emerald-800 text-white px-6 py-3 rounded-xl font-black" onclick="switchTab('tab2')">名人堂</button>
        </nav>

        <div id="debug-status" class="text-center text-[10px] text-emerald-300 mb-2">系統啟動中...</div>

        <div id="tab1" class="tab-content">
            <div class="flex justify-center gap-2 mb-8">
                <button class="px-4 py-2 rounded-full bg-emerald-900 text-white text-xs font-bold hover:bg-emerald-700" onclick="renderRank('all')">總排名</button>
                <button class="px-4 py-2 rounded-full bg-emerald-800 text-white text-xs font-bold hover:bg-emerald-700" onclick="renderRank('2026')">2026</button>
            </div>
            
            <div class="bg-[#fdfbf7] rounded-xl overflow-hidden shadow-2xl border-b-4 border-r-4 border-gray-300">
                <div id="rankContainer" class="divide-y divide-gray-100">
                    <p class="p-10 text-center text-gray-400 font-bold">數據載入中，請稍候...</p>
                </div>
            </div>
        </div>

        <div id="tab2" class="tab-content hidden">
            <div class="text-center p-10 bg-emerald-900/50 rounded-xl text-white border-2 border-dashed border-emerald-700">
                <p class="text-2xl mb-2">🏆 名人堂</p>
                <p class="text-gray-400">數據收集中，下一波更新...</p>
            </div>
        </div>
    </div>
  <script>
    // 1. 換咗呢條新嘅 Link 試試
    const SHEET_ID = '15oFBkMppeKvViMEBEPyKqnyL1Gyrc9sJp1z8se38QxU';
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;

    let ALL_PLAYERS = [];

    async function fetchData() {
        const debug = document.getElementById('debug-status');
        try {
            debug.innerText = "嘗試抓取數據中...";
            const response = await fetch(CSV_URL);
            const csvText = await response.text();
            
            // 睇下攞返嚟嘅文字係咪真係名單
            console.log("CSV 內容預覽:", csvText.substring(0, 100));

            const rows = csvText.split(/\r?\n/).filter(row => row.trim() !== '');
            if (rows.length < 2) {
                debug.innerText = "⚠️ 攞到檔案，但入面好似冇名單數據。";
                return;
            }

            const dataRows = rows.slice(1);
            ALL_PLAYERS = dataRows.map(row => {
                // 有些 CSV 會用引號包住，我哋幫佢整返乾淨
                const cols = row.split(',').map(c => c.replace(/"/g, '').trim());
                return {
                    name: cols[0] || '無名氏',
                    sum: parseInt(cols[1]) || 0,
                    games: parseInt(cols[2]) || 0,
                    icon: cols[5] || '🀄',
                    title: cols[6] || '雀友',
                    yearly: { "2026": parseInt(cols[10]) || 0 }
                };
            });

            debug.innerText = `✅ 成功讀取 ${ALL_PLAYERS.length} 位雀友`;
            renderRank('all');

        } catch (e) {
            debug.innerText = "❌ 連線失敗: " + e.message;
            console.error(e);
        }
    }

    function renderRank(year) {
        const container = document.getElementById('rankContainer');
        let list = [...ALL_PLAYERS].sort((a, b) => b.sum - a.sum);

        container.innerHTML = list.map((p, i) => `
            <div class="p-4 flex justify-between items-center bg-white border-b">
                <div class="flex items-center gap-3">
                    <span class="text-gray-400 font-bold">${i+1}</span>
                    <span class="text-2xl">${p.icon}</span>
                    <div>
                        <div class="font-black text-emerald-900">${p.name}</div>
                        <div class="text-[10px] text-gray-400">${p.title}</div>
                    </div>
                </div>
                <div class="text-right">
                    <div class="font-black text-emerald-600">${p.sum > 0 ? '+' : ''}${p.sum}</div>
                    <div class="text-[10px] text-gray-400">${p.games} 局</div>
                </div>
            </div>
        `).join('');
    }

    function switchTab(id) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    window.onload = fetchData;
</script>
</body>
</html>
