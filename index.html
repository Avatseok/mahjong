<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雀王排行榜 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@700;900&display=swap');
        body { font-family: 'Noto Sans HK', sans-serif; background-color: #064e3b; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-md mx-auto">
        <header class="text-center py-10">
            <h1 class="text-4xl font-black text-[#fdfbf7] italic drop-shadow-[3px_3px_0px_#b91c1c]">🀄 雀王排行榜</h1>
            <p id="status" class="text-emerald-300 text-[10px] mt-2 font-mono uppercase tracking-widest text-center">數據解析中...</p>
        </header>

        <div id="board" class="bg-white rounded-[2rem] shadow-2xl overflow-hidden border-b-8 border-emerald-900/20 min-h-[300px]">
            <div class="p-20 text-center text-gray-300">正在計算戰果...</div>
        </div>
    </div>

    <script>
        const SHEET_ID = '15oFBkMppeKvViMEBEPyKqnyL1Gyrc9sJp1z8se38QxU';
        const GID = '719393887';
        const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

        async function loadData() {
            const status = document.getElementById('status');
            const board = document.getElementById('board');

            try {
                const response = await fetch(URL);
                const csvText = await response.text();
                
                const rows = csvText.split(/\r?\n/).filter(r => r.trim() !== '');
                let finalStats = {}; // 用嚟儲存 { "Ava": { total: 0, games: 0 } }

                // 從第二行開始讀每一場對局
                rows.slice(1).forEach(row => {
                    // CSV 拆分，考慮到 Scores 欄位可能有引號包住
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim());
                    
                    // C 欄 (Index 2) 係原始字串: "Ava -140; Yanyi +492; Stephy -180; Joe -172"
                    const scoreString = cols[2];
                    if (!scoreString) return;

                    // 1. 用分號 ";" 拆開每個玩家
                    const segments = scoreString.split(';');

                    segments.forEach(seg => {
                        // 2. 搵出名同分。用 regex 搵最後一個連住數字嘅位
                        // 預期格式: "Ava -140" 或 "Yanyi +492"
                        const match = seg.trim().match(/^(.+?)\s+([+-]?\d+)$/);
                        
                        if (match) {
                            const name = match[1].trim();
                            const score = parseInt(match[2]);

                            if (!finalStats[name]) {
                                finalStats[name] = { total: 0, games: 0 };
                            }
                            finalStats[name].total += score;
                            finalStats[name].games += 1;
                        }
                    });
                });

                // 3. 排序
                const sortedResult = Object.keys(finalStats)
                    .map(name => ({
                        name: name,
                        total: finalStats[name].total,
                        games: finalStats[name].games
                    }))
                    .sort((a, b) => b.total - a.total);

                status.innerText = `✅ 成功讀取 ${rows.length - 1} 場對局`;

                // 4. 渲染
                if (sortedResult.length === 0) {
                    board.innerHTML = `<div class="p-20 text-center text-gray-400">搵唔到玩家數據，請檢查 Excel C 欄格式。</div>`;
                } else {
                    board.innerHTML = sortedResult.map((p, i) => `
                        <div class="flex items-center justify-between p-6 border-b border-gray-50 last:border-0 hover:bg-emerald-50 transition-colors">
                            <div class="flex items-center gap-4">
                                <span class="text-xl font-black ${i < 3 ? 'text-amber-500' : 'text-gray-200'}">${i + 1}</span>
                                <div>
                                    <div class="font-black text-gray-800 text-lg leading-tight">${p.name}</div>
                                    <div class="text-[9px] font-bold text-emerald-500 bg-emerald-100 px-1.5 py-0.5 rounded mt-1 inline-block uppercase">Player</div>
                                </div>
                            </div>
                            <div class="text-right">
                                <div class="text-2xl font-black ${p.total >= 0 ? 'text-emerald-600' : 'text-red-500'}">
                                    ${p.total > 0 ? '+' : ''}${p.total}
                                </div>
                                <div class="text-[10px] text-gray-400 font-bold">${p.games} 局</div>
                            </div>
                        </div>
                    `).join('');
                }

            } catch (err) {
                status.innerText = "❌ 系統錯誤";
                board.innerHTML = `<div class="p-10 text-center text-red-500 text-xs font-bold">${err.message}</div>`;
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
