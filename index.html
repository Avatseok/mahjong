<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🀄️ 雀王爭霸戰 2026 🀄️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@900&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        :root { --mj-green: #064e3b; --mj-tile: #fdfbf7; --mj-red: #b91c1c; }
        body { background-color: var(--mj-green); font-family: 'Noto Sans TC', sans-serif; background-image: radial-gradient(#065f46 2px, transparent 2px); background-size: 30px 30px; }
        .title-font { font-family: 'Noto Serif TC', serif; color: var(--mj-tile); text-shadow: 4px 4px 0px var(--mj-red); }
        .nav-btn { padding: 12px 24px; border-radius: 12px; color: white; font-weight: 900; cursor: pointer; transition: 0.3s; background: rgba(255,255,255,0.1); }
        .nav-btn.active { background: var(--mj-tile); color: var(--mj-green); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .tile-card { background: var(--mj-tile); border-bottom: 5px solid #d1d5db; border-right: 5px solid #d1d5db; border-radius: 12px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .score-pill { padding: 2px 10px; border-radius: 999px; font-size: 11px; font-weight: 900; }
        .win { background: #dcfce7; color: #166534; }
        .lose { background: #fee2e2; color: #991b1b; }
        .rank-row { border-left: 8px solid transparent; transition: 0.2s; }
        .rank-1 { border-left-color: #fbbf24; background: linear-gradient(90deg, #fef3c7, transparent); }
        .rank-2 { border-left-color: #94a3b8; background: linear-gradient(90deg, #f1f5f9, transparent); }
        .rank-3 { border-left-color: #d97706; background: linear-gradient(90deg, #ffedd5, transparent); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-5xl md:text-7xl title-font tracking-tighter mb-4">🀄️ 雀王爭霸戰 🀄️</h1>
            <p id="status" class="text-emerald-300 text-xs font-mono italic">DATA LOADING...</p>
        </header>

        <nav class="flex flex-wrap justify-center gap-3 mb-10 text-sm">
            <div class="nav-btn active" onclick="switchTab('tab1', this)">龍虎榜</div>
            <div class="nav-btn" onclick="switchTab('tab2', this)">名人堂</div>
            <div class="nav-btn" onclick="switchTab('tab3', this)">個人戰績</div>
            <div class="nav-btn" onclick="switchTab('tab4', this)">流水帳</div>
            <div class="nav-btn bg-red-800 hover:bg-red-700" onclick="switchTab('tab5', this)">➕ 新紀錄</div>
        </nav>

        <div id="tab1" class="tab-content active">
            <div class="flex justify-center flex-wrap gap-2 mb-8">
                <button class="year-btn px-5 py-2 rounded-full bg-emerald-900 text-white font-black text-xs" onclick="updateRank('all', this)">總排名</button>
                <button class="year-btn px-5 py-2 rounded-full bg-emerald-800 text-white font-black text-xs opacity-60" onclick="updateRank('2026', this)">2026</button>
                <button class="year-btn px-5 py-2 rounded-full bg-emerald-800 text-white font-black text-xs opacity-60" onclick="updateRank('2025', this)">2025</button>
                <button class="year-btn px-5 py-2 rounded-full bg-emerald-800 text-white font-black text-xs opacity-60" onclick="updateRank('2024', this)">2024</button>
            </div>
            <div class="tile-card bg-white overflow-hidden shadow-xl max-w-2xl mx-auto">
                <div id="rankContainer" class="divide-y divide-gray-100"></div>
            </div>
        </div>

        <div id="tab2" class="tab-content">
            <div id="hallGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <div id="tab3" class="tab-content">
            <div id="personalContainer" class="max-w-4xl mx-auto">
                <div class="text-center text-white mb-8">
                    <p class="italic">請點擊下方「名人堂」或「龍虎榜」玩家名（開發中：目前預設顯示榜首數據）</p>
                </div>
                <div id="personalHero"></div>
            </div>
        </div>

        <div id="tab4" class="tab-content">
            <div id="logsContainer" class="space-y-4 max-w-2xl mx-auto"></div>
        </div>

        <div id="tab5" class="tab-content">
            <div class="max-w-xl mx-auto tile-card p-8 bg-white shadow-xl text-center">
                <h3 class="font-black text-emerald-900 mb-4 text-xl">如何新增紀錄？</h3>
                <p class="text-gray-500 text-sm mb-6 leading-relaxed">
                    本網站數據直接與 Google Sheets 同步。<br>
                    請直接前往 Excel 填寫新行，網頁重新整理後會自動更新！
                </p>
                <a href="https://docs.google.com/spreadsheets/d/15oFBkMppeKvViMEBEPyKqnyL1Gyrc9sJp1z8se38QxU" target="_blank" class="inline-block bg-emerald-900 text-white font-black px-8 py-3 rounded-xl">打開 Google Sheets</a>
            </div>
        </div>
    </div>

    <script>
        const SHEET_ID = '15oFBkMppeKvViMEBEPyKqnyL1Gyrc9sJp1z8se38QxU';
        const GID = '719393887';
        const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;
        
        let rawData = [];
        let playerStats = {};

        const formatName = (n) => n.trim().toLowerCase().charAt(0).toUpperCase() + n.trim().toLowerCase().slice(1);

        async function init() {
            try {
                const response = await fetch(URL);
                const csvText = await response.text();
                const rows = csvText.split(/\r?\n/).filter(r => r.trim() !== '');
                
                rawData = rows.slice(1).map(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim());
                    return { date: cols[0], type: cols[1], scores: cols[2], year: cols[0].split('-')[0] };
                });

                processData();
                renderAll();
                document.getElementById('status').innerText = "✅ DATA SYNCHRONIZED";
            } catch (err) {
                document.getElementById('status').innerText = "❌ LOAD FAILED";
            }
        }

       function processData() {
    playerStats = {};
    // 先按日期由舊到新排序，計算連勝先準確
    const sortedData = [...rawData].sort((a, b) => new Date(a.date) - new Date(b.date));

    // 追蹤 Ava 連勝用
    let avaCurrentStreak = 0;
    let avaMaxStreak = 0;

    sortedData.forEach(match => {
        const segments = match.scores.split(';');
        segments.forEach(seg => {
            const parts = seg.trim().match(/^(.+?)\s+([+-]?\d+)$/);
            if (parts) {
                const name = formatName(parts[1]);
                const score = parseInt(parts[2]);
                
                if (!playerStats[name]) {
                    playerStats[name] = { total: 0, games: 0, wins: 0, maxWin: 0, yearly: {} };
                }
                
                playerStats[name].total += score;
                playerStats[name].games += 1;
                if (score > 0) playerStats[name].wins += 1;
                if (score > playerStats[name].maxWin) playerStats[name].maxWin = score;

                if (!playerStats[name].yearly[match.year]) {
                    playerStats[name].yearly[match.year] = { score: 0, games: 0 };
                }
                playerStats[name].yearly[match.year].score += score;
                playerStats[name].yearly[match.year].games += 1;

                // 專門測算 Ava 的連勝
                if (name === 'Ava') {
                    if (score > 0) {
                        avaCurrentStreak++;
                        if (avaCurrentStreak > avaMaxStreak) avaMaxStreak = avaCurrentStreak;
                    } else {
                        avaCurrentStreak = 0;
                    }
                }
            }
        });
    });
    // 將紀錄儲存返落 Ava 身上
    if (playerStats['Ava']) playerStats['Ava'].maxStreak = avaMaxStreak;
}

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        function updateRank(year, btn) {
            document.querySelectorAll('.year-btn').forEach(b => b.classList.add('opacity-60'));
            btn.classList.remove('opacity-60');
            renderRankTable(year);
        }

        function renderRankTable(year) {
            const container = document.getElementById('rankContainer');
            const sorted = Object.keys(playerStats).map(name => {
    let val, games;
    if (year === 'all') {
        val = playerStats[name].total;
        games = playerStats[name].games;
    } else {
        // 如果嗰年有玩過，就攞嗰年嘅數，否則係 0
        const yearlyData = playerStats[name].yearly[year] || { score: 0, games: 0 };
        val = yearlyData.score;
        games = yearlyData.games;
    }
    return { name, val, games };
}).filter(p => p.val !== 0).sort((a,b) => b.val - a.val);
            container.innerHTML = sorted.map((p, i) => `
                <div class="rank-row p-4 flex justify-between items-center bg-white ${i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':''}">
                    <div class="flex items-center gap-4">
                        <span class="w-6 font-black text-gray-400 italic text-sm">${i+1}</span>
                        <div>
                            <p class="font-black text-emerald-900">${p.name}</p>
                            <p class="text-[9px] text-gray-400 font-bold uppercase tracking-tighter italic">Player Rank</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-black text-sm ${p.val >= 0 ? 'text-emerald-600' : 'text-red-600'}">${p.val > 0 ? '+' : ''}${p.val}</p>
                        <p class="text-[10px] text-gray-400 font-bold">${p.games} 局</p>
                    </div>
                </div>
            `).join('');
        }

        function renderHall() {
            const grid = document.getElementById('hallGrid');
            const sorted = Object.keys(playerStats).map(name => ({name, ...playerStats[name]}))
                          .sort((a,b) => b.total - a.total);

            grid.innerHTML = sorted.map(p => {
                const winRate = ((p.wins / p.games) * 100).toFixed(1);
                return `
                    <div class="tile-card p-6 bg-white flex flex-col items-center text-center h-full">
                        <span class="text-[10px] bg-emerald-100 text-emerald-800 px-3 py-1 rounded-full font-black mb-4">HALL OF FAME</span>
                        <h3 class="text-2xl font-black text-emerald-900 mb-4">${p.name}</h3>
                        <div class="grid grid-cols-2 gap-4 w-full text-[11px] font-bold text-gray-400 pt-4 border-t">
                            <div class="text-left">勝率: ${winRate}%</div>
                            <div class="text-right">局數: ${p.games}</div>
                            <div class="text-left ${p.total >= 0 ? 'text-emerald-600' : 'text-red-600'}">總分: ${p.total}</div>
                            <div class="text-right text-amber-500">最高: +${p.maxWin}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderLogs() {
            const container = document.getElementById('logsContainer');
            container.innerHTML = rawData.slice(0, 20).map(l => `
                <div class="tile-card p-5 bg-white border-l-8 border-l-emerald-800">
                    <div class="flex justify-between text-[10px] font-black text-gray-400 mb-3">
                        <span>📅 ${l.date}</span>
                        <span class="uppercase bg-emerald-800 text-white px-2 py-0.5 rounded">${l.type}</span>
                    </div>
                    <div class="flex flex-wrap gap-2">
                        ${l.scores.split(';').map(s => {
                            const isWin = s.includes('+') || (!s.includes('-') && parseInt(s.match(/\d+/)) > 0);
                            return `<span class="score-pill ${isWin?'win':'lose'}">${s.trim()}</span>`
                        }).join('')}
                    </div>
                </div>
            `).join('');
        }
        // 呢段係新加嘅，直接貼喺 script 入面就得
function renderPersonal() {
    const container = document.getElementById('personalHero');
    const p = playerStats['Ava'];
    if (!p) return;

    container.innerHTML = `
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="tile-card p-6 text-center bg-white flex flex-col justify-center">
                <p class="text-xs font-black text-gray-400 mb-2 uppercase tracking-widest italic">Cumulative Profit (Ava)</p>
                <p class="text-6xl font-black ${p.total >= 0 ? 'text-emerald-600' : 'text-red-600'}">
                    ${p.total > 0 ? '+' : ''}${p.total}
                </p>
            </div>
            
            <div class="md:col-span-2 tile-card p-6 bg-white">
                <h3 class="font-black text-emerald-900 mb-4 border-b pb-2 italic">📅 Yearly Status</h3>
                <div class="grid grid-cols-3 gap-4">
                    ${['2026', '2025', '2024'].map(yr => `
                        <div class="text-center p-4 bg-emerald-50/50 rounded-xl">
                            <p class="text-[10px] font-bold text-gray-400">${yr} YTD</p>
                            <p class="text-2xl font-black ${(p.yearly[yr]?.score || 0) >= 0 ? 'text-emerald-600' : 'text-red-600'}">
                                ${(p.yearly[yr]?.score || 0) > 0 ? '+' : ''}${(p.yearly[yr]?.score || 0)}
                            </p>
                        </div>
                    `).join('')}
                </div>
            </div>

            <div class="md:col-span-3 tile-card p-8 bg-white border-t-8 border-amber-400">
                <h3 class="font-black text-emerald-900 mb-6 text-center text-xl italic underline decoration-amber-400">🏆 Career Milestones</h3>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="bg-amber-100 p-4 rounded-2xl text-center shadow-inner">
                        <p class="text-[10px] font-bold text-amber-800 uppercase">最高連勝</p>
                        <p class="text-3xl font-black text-amber-600">${p.maxStreak || 0} <span class="text-sm">局</span></p>
                    </div>
                    <div class="bg-emerald-50 p-4 rounded-2xl text-center">
                        <p class="text-[10px] font-bold text-emerald-800 uppercase">單局最高</p>
                        <p class="text-3xl font-black text-emerald-600">+${p.maxWin}</p>
                    </div>
                    <div class="bg-blue-50 p-4 rounded-2xl text-center">
                        <p class="text-[10px] font-bold text-blue-800 uppercase">總勝率</p>
                        <p class="text-3xl font-black text-blue-600">${((p.wins / p.games) * 100).toFixed(1)}%</p>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-2xl text-center">
                        <p class="text-[10px] font-bold text-gray-800 uppercase">對局總量</p>
                        <p class="text-3xl font-black text-gray-600">${p.games}</p>
                    </div>
                </div>
            </div>
        </div>
    `;
}

        function renderAll() {
            renderRankTable('all');
            renderHall();
            renderLogs();
            renderPersonal();
        }

        window.onload = init;
    </script>
</body>
</html>
