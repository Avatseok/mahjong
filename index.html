<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雀王爭霸 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-emerald-950 p-4 font-sans text-white">

    <div class="max-w-md mx-auto">
        <header class="text-center py-8">
            <h1 class="text-4xl font-black italic italic drop-shadow-md">🀄 雀王排行榜</h1>
            <p id="status-debug" class="text-emerald-400 text-[10px] mt-2 font-mono">連線中...</p>
        </header>

        <div id="board" class="bg-white rounded-[2rem] shadow-2xl overflow-hidden text-gray-800">
            <div class="p-10 text-center text-gray-400 italic">
                數據載入中...
            </div>
        </div>
        
        <div id="raw-preview" class="mt-4 p-2 bg-black/30 rounded text-[10px] font-mono hidden"></div>
    </div>

    <script>
        // 你的資料
        const SHEET_ID = '15oFBkMppeKvViMEBEPyKqnyL1Gyrc9sJp1z8se38QxU';
        const GID = '719393887';
        // 使用 CSV 導出模式，這是對付「任何人可見」最有效的方法
        const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

        async function init() {
            const status = document.getElementById('status-debug');
            const board = document.getElementById('board');
            const preview = document.getElementById('raw-preview');

            try {
                const response = await fetch(URL);
                const csvText = await response.text();
                
                // 檢查攞到嘅嘢係咪 HTML (代表權限仲有問題)
                if (csvText.includes('<!DOCTYPE')) {
                    status.innerText = "❌ 權限錯誤：請確保 Google Sheet 設為「知道連結的任何人」。";
                    return;
                }

                // 分解 CSV 行
                const rows = csvText.split(/\r?\n/).map(row => 
                    row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim())
                );

                // Row 1: A=Date, B=Type, C...=Players
                const header = rows[0];
                const playerNames = header.slice(2);
                
                if (playerNames.length === 0) {
                    status.innerText = "⚠️ 讀到表格，但第一行 C 欄打後冇人名。";
                    return;
                }

                let scoreboard = {};
                playerNames.forEach(name => {
                    if (name) scoreboard[name] = { total: 0, games: 0 };
                });

                // Row 2 開始計數
                rows.slice(1).forEach(cols => {
                    playerNames.forEach((name, i) => {
                        const val = parseInt(cols[i + 2]);
                        if (!isNaN(val)) {
                            scoreboard[name].total += val;
                            scoreboard[name].games += 1;
                        }
                    });
                });

                // 排序
                const sorted = Object.keys(scoreboard)
                    .map(name => ({ name, score: scoreboard[name].total, games: scoreboard[name].games }))
                    .sort((a, b) => b.score - a.score);

                status.innerText = `✅ 成功讀取 ${sorted.length} 位雀友數據`;

                // 渲染畫面
                board.innerHTML = sorted.map((p, i) => `
                    <div class="flex items-center justify-between p-6 border-b border-gray-50 last:border-0">
                        <div class="flex items-center gap-4">
                            <span class="text-xl font-black ${i < 3 ? 'text-amber-500' : 'text-gray-200'}">${i + 1}</span>
                            <div>
                                <div class="font-black text-gray-800 text-lg">${p.name}</div>
                                <div class="text-[9px] text-emerald-600 font-bold">雀友</div>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-2xl font-black ${p.score >= 0 ? 'text-emerald-600' : 'text-red-500'}">
                                ${p.score > 0 ? '+' : ''}${p.score}
                            </div>
                            <div class="text-[10px] text-gray-400">${p.games} 局</div>
                        </div>
                    </div>
                `).join('');

            } catch (err) {
                status.innerText = "❌ 連線失敗";
                console.error(err);
            }
        }

        window.onload = init;
    </script>
</body>
</html>
