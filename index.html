<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雀王排行榜 - 年度對決</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@700;900&display=swap');
        body { font-family: 'Noto Sans HK', sans-serif; background-color: #064e3b; }
        .tab-active { background-color: #fdfbf7 !important; color: #064e3b !important; transform: scale(1.05); }
        /* 貼在原本的 .tab-active 下面即可 */

.hall-card {
    background: linear-gradient(145deg, #ffffff, #f0fdf4);
    border: 1px solid #d1fae5;
    transition: transform 0.2s;
    margin-bottom: 1rem;
}

.hall-card:hover { 
    transform: translateY(-5px); 
}

.stat-box { 
    background: rgba(6, 78, 59, 0.05); 
    border-radius: 12px; 
    padding: 10px 5px; 
}
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-md mx-auto">
        <header class="text-center py-6">
            <h1 class="text-4xl font-black text-[#fdfbf7] italic drop-shadow-[3px_3px_0px_#b91c1c]">🀄 雀王龍虎榜</h1>
            <p id="status" class="text-emerald-300 text-[10px] mt-2 font-mono uppercase tracking-widest text-center italic">數據傳輸中...</p>
        </header>

        <nav class="flex justify-between gap-1 mb-6 bg-emerald-900/50 p-1 rounded-2xl border border-emerald-700">
            <button onclick="changeYear('all')" id="btn-all" class="tab-active flex-1 py-2 rounded-xl text-xs font-bold text-emerald-300 transition-all">總榜</button>
            <button onclick="changeYear('2026')" id="btn-2026" class="flex-1 py-2 rounded-xl text-xs font-bold text-emerald-300 transition-all">2026</button>
            <button onclick="changeYear('2025')" id="btn-2025" class="flex-1 py-2 rounded-xl text-xs font-bold text-emerald-300 transition-all">2025</button>
            <button onclick="changeYear('2024')" id="btn-2024" class="flex-1 py-2 rounded-xl text-xs font-bold text-emerald-300 transition-all">2024</button>
            <button onclick="switchMode('hall')" id="btn-hall" class="flex-1 py-2 rounded-xl text-xs font-bold text-emerald-300 transition-all">名人堂</button>
        </nav>

        <div id="board" class="bg-white rounded-[2rem] shadow-2xl overflow-hidden border-b-8 border-emerald-900/20 min-h-[400px]">
            <div class="p-20 text-center text-gray-300 animate-pulse">正在分拆數據...</div>
        </div>
    </div>

    <script>
        const SHEET_ID = '15oFBkMppeKvViMEBEPyKqnyL1Gyrc9sJp1z8se38QxU';
        const GID = '719393887';
        const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

        let allMatches = []; // 儲存所有對局原始數據
        let currentView = 'all';
// 將名字轉為：首字母大楷，其餘細楷 (例如 aVa -> Ava)
function formatName(name) {
    if (!name) return "";
    const cleanName = name.trim().toLowerCase();
    return cleanName.charAt(0).toUpperCase() + cleanName.slice(1);
}
        async function init() {
            try {
                const response = await fetch(URL);
                const csvText = await response.text();
                const rows = csvText.split(/\r?\n/).filter(r => r.trim() !== '');
                
                // 解析所有對局
                allMatches = rows.slice(1).map(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim());
                    return {
                        date: cols[0], // A 欄：日期
                        year: cols[0].split('-')[0], // 攞年份 (例如 2024)
                        scoreStr: cols[2] // C 欄：原始分數串
                    };
                });

                renderBoard('all');
                document.getElementById('status').innerText = "✅ 數據已就緒";
            } catch (err) {
                document.getElementById('status').innerText = "❌ 讀取失敗";
            }
        }

        // 修改後的 renderBoard 函數
function renderBoard(yearFilter) {
    const board = document.getElementById('board');
    let stats = calculateStats(yearFilter); // 使用統一的計分邏輯

    const sorted = Object.keys(stats)
        .map(name => ({ name, ...stats[name] }))
        .sort((a, b) => b.total - a.total);

    if (sorted.length === 0) {
        board.innerHTML = `<div class="p-20 text-center text-gray-400">暫無數據。</div>`;
        return;
    }

    board.innerHTML = sorted.map((p, i) => `
        <div class="flex items-center justify-between p-5 border-b border-gray-50 last:border-0 hover:bg-emerald-50 transition-colors">
            <div class="flex items-center gap-4">
                <span class="text-xl font-black ${i<3 ? 'text-amber-500' : 'text-gray-200'}">${i + 1}</span>
                <div>
                    <div class="font-black text-gray-800 text-base leading-tight">${p.name}</div>
                    <div class="text-[9px] font-bold text-emerald-500 mt-1 uppercase">Player</div>
                </div>
            </div>
            <div class="text-right">
                <div class="text-xl font-black ${p.total >= 0 ? 'text-emerald-600' : 'text-red-500'}">
                    ${p.total > 0 ? '+' : ''}${p.total}
                </div>
                <div class="text-[10px] text-gray-400 font-bold">${p.games} 局</div>
            </div>
        </div>
    `).join('');
}

// ---------------------------
// 新增：名人堂渲染函數
// ---------------------------
function renderHall() {
    const board = document.getElementById('board');
    let stats = calculateStats('all'); // 名人堂永遠顯示總數據

    const sorted = Object.keys(stats)
        .map(name => ({ name, ...stats[name] }))
        .sort((a, b) => b.total - a.total);

    board.innerHTML = `<div class="grid grid-cols-1 gap-4 p-4">` + 
        sorted.map(p => {
            const winRate = ((p.wins / p.games) * 100).toFixed(1);
            return `
                <div class="hall-card rounded-2xl p-5 shadow-sm">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="text-xl font-black text-emerald-900">${p.name}</h3>
                            <p class="text-[10px] font-bold text-emerald-600 uppercase tracking-widest">Hall of Fame Member</p>
                        </div>
                        <div class="text-right">
                            <span class="text-2xl font-black ${p.total >= 0 ? 'text-emerald-600' : 'text-red-500'}">
                                ${p.total > 0 ? '+' : ''}${p.total}
                            </span>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-3 gap-2 text-center">
                        <div class="stat-box">
                            <p class="text-[9px] text-gray-400 font-bold uppercase">勝率</p>
                            <p class="text-sm font-black text-emerald-800">${winRate}%</p>
                        </div>
                        <div class="stat-box">
                            <p class="text-[9px] text-gray-400 font-bold uppercase">總局數</p>
                            <p class="text-sm font-black text-emerald-800">${p.games}</p>
                        </div>
                        <div class="stat-box">
                            <p class="text-[9px] text-gray-400 font-bold uppercase">單局最高</p>
                            <p class="text-sm font-black text-amber-500">+${p.maxScore}</p>
                        </div>
                    </div>
                </div>
            `;
        }).join('') + `</div>`;
}

// ---------------------------
// 新增：統一計算逻辑
// ---------------------------
function calculateStats(yearFilter) {
    let stats = {};
    const formatName = (n) => n.trim().toLowerCase().charAt(0).toUpperCase() + n.trim().toLowerCase().slice(1);

    allMatches.forEach(match => {
        if (yearFilter !== 'all' && match.year !== yearFilter) return;

        const segments = match.scoreStr.split(';');
        segments.forEach(seg => {
            const matchData = seg.trim().match(/^(.+?)\s+([+-]?\d+)$/);
            if (matchData) {
                const name = formatName(matchData[1]);
                const score = parseInt(matchData[2]);
                
                if (!stats[name]) {
                    stats[name] = { total: 0, games: 0, wins: 0, maxScore: 0 };
                }
                
                stats[name].total += score;
                stats[name].games += 1;
                if (score > 0) stats[name].wins += 1;
                if (score > stats[name].maxScore) stats[name].maxScore = score;
            }
        });
    });
    return stats;
}

// 切換模式的控制
function switchMode(mode) {
    // 移除所有按鈕的 active 樣式
    ['all', '2026', '2025', '2024', 'hall'].forEach(m => {
        const btn = document.getElementById(`btn-${m}`);
        if(btn) btn.classList.remove('tab-active');
    });
    
    // 加入 active 樣式
    document.getElementById(`btn-${mode}`).classList.add('tab-active');

    if (mode === 'hall') {
        renderHall();
    } else {
        renderBoard(mode);
    }
}

        window.onload = init;
    </script>
</body>
</html>
