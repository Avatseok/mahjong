<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>йӣҖзҺӢжҺ’иЎҢжҰң - е№ҙеәҰе°Қжұә</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@700;900&display=swap');
        body { font-family: 'Noto Sans HK', sans-serif; background-color: #064e3b; }
        .tab-active { background-color: #fdfbf7 !important; color: #064e3b !important; transform: scale(1.05); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-md mx-auto">
        <header class="text-center py-6">
            <h1 class="text-4xl font-black text-[#fdfbf7] italic drop-shadow-[3px_3px_0px_#b91c1c]">рҹҖ„ йӣҖзҺӢйҫҚиҷҺжҰң</h1>
            <p id="status" class="text-emerald-300 text-[10px] mt-2 font-mono uppercase tracking-widest text-center italic">ж•ёж“ҡеӮіијёдёӯ...</p>
        </header>

        <nav class="flex justify-between gap-1 mb-6 bg-emerald-900/50 p-1 rounded-2xl border border-emerald-700">
            <button onclick="changeYear('all')" id="btn-all" class="tab-active flex-1 py-2 rounded-xl text-xs font-bold text-emerald-300 transition-all">зёҪжҰң</button>
            <button onclick="changeYear('2026')" id="btn-2026" class="flex-1 py-2 rounded-xl text-xs font-bold text-emerald-300 transition-all">2026</button>
            <button onclick="changeYear('2025')" id="btn-2025" class="flex-1 py-2 rounded-xl text-xs font-bold text-emerald-300 transition-all">2025</button>
            <button onclick="changeYear('2024')" id="btn-2024" class="flex-1 py-2 rounded-xl text-xs font-bold text-emerald-300 transition-all">2024</button>
        </nav>

        <div id="board" class="bg-white rounded-[2rem] shadow-2xl overflow-hidden border-b-8 border-emerald-900/20 min-h-[400px]">
            <div class="p-20 text-center text-gray-300 animate-pulse">жӯЈеңЁеҲҶжӢҶж•ёж“ҡ...</div>
        </div>
    </div>

    <script>
        const SHEET_ID = '15oFBkMppeKvViMEBEPyKqnyL1Gyrc9sJp1z8se38QxU';
        const GID = '719393887';
        const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

        let allMatches = []; // е„ІеӯҳжүҖжңүе°ҚеұҖеҺҹе§Ӣж•ёж“ҡ
        let currentView = 'all';

        async function init() {
            try {
                const response = await fetch(URL);
                const csvText = await response.text();
                const rows = csvText.split(/\r?\n/).filter(r => r.trim() !== '');
                
                // и§ЈжһҗжүҖжңүе°ҚеұҖ
                allMatches = rows.slice(1).map(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim());
                    return {
                        date: cols[0], // A ж¬„пјҡж—Ҙжңҹ
                        year: cols[0].split('-')[0], // ж”һе№ҙд»Ҫ (дҫӢеҰӮ 2024)
                        scoreStr: cols[2] // C ж¬„пјҡеҺҹе§ӢеҲҶж•ёдёІ
                    };
                });

                renderBoard('all');
                document.getElementById('status').innerText = "вң… ж•ёж“ҡе·Іе°ұз·’";
            } catch (err) {
                document.getElementById('status').innerText = "вқҢ и®ҖеҸ–еӨұж•—";
            }
        }

        function renderBoard(yearFilter) {
            const board = document.getElementById('board');
            let stats = {};

            // йҒҺжҝҫдёҰиЁҲеҲҶ
            allMatches.forEach(match => {
                if (yearFilter !== 'all' && match.year !== yearFilter) return;

                const segments = match.scoreStr.split(';');
                segments.forEach(seg => {
                    const matchData = seg.trim().match(/^(.+?)\s+([+-]?\d+)$/);
                    if (matchData) {
                        const name = matchData[1].trim();
                        const score = parseInt(matchData[2]);
                        if (!stats[name]) stats[name] = { total: 0, games: 0 };
                        stats[name].total += score;
                        stats[name].games += 1;
                    }
                });
            });

            // жҺ’еәҸ
            const sorted = Object.keys(stats)
                .map(name => ({ name, total: stats[name].total, games: stats[name].games }))
                .sort((a, b) => b.total - a.total);

            // жӣҙж–° UI
            if (sorted.length === 0) {
                board.innerHTML = `<div class="p-20 text-center text-gray-400">и©Іе№ҙеәҰжҡ«з„Ўе°ҚеұҖж•ёж“ҡгҖӮ</div>`;
            } else {
                board.innerHTML = sorted.map((p, i) => `
                    <div class="flex items-center justify-between p-5 border-b border-gray-50 last:border-0 hover:bg-emerald-50 transition-colors">
                        <div class="flex items-center gap-4">
                            <span class="text-xl font-black ${i<3 ? 'text-amber-500' : 'text-gray-200'}">${i + 1}</span>
                            <div>
                                <div class="font-black text-gray-800 text-base leading-tight">${p.name}</div>
                                <div class="text-[9px] font-bold text-emerald-500 mt-1 uppercase tracking-tighter">Mahjong Master</div>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-xl font-black ${p.total >= 0 ? 'text-emerald-600' : 'text-red-500'}">
                                ${p.total > 0 ? '+' : ''}${p.total}
                            </div>
                            <div class="text-[10px] text-gray-400 font-bold">${p.games} еұҖ</div>
                        </div>
                    </div>
                `).join('');
            }
        }

        function changeYear(year) {
            // еҲҮжҸӣжҢүйҲ•жЁЈејҸ
            ['all', '2026', '2025', '2024'].forEach(y => {
                document.getElementById(`btn-${y}`).classList.remove('tab-active');
            });
            document.getElementById(`btn-${year}`).classList.add('tab-active');
            
            // йҮҚж–°жёІжҹ“
            renderBoard(year);
        }

        window.onload = init;
    </script>
</body>
</html>
