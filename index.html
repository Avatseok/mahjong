<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雀王排行榜 - 重新出發</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#064e3b] p-4 font-sans">

    <div class="max-w-md mx-auto">
        <header class="text-center py-10">
            <h1 class="text-4xl font-black text-white italic drop-shadow-lg">🀄 雀王排行榜</h1>
            <p id="status" class="text-emerald-300 text-[10px] mt-2 font-mono">檢查權限中...</p>
        </header>

        <div id="rankList" class="bg-white rounded-3xl shadow-2xl overflow-hidden">
            <div class="p-10 text-center text-gray-400">
                正在讀取 Google Sheet...
            </div>
        </div>
    </div>

    <script>
        // 確保呢個 ID 係啱嘅
        const SHEET_ID = '15oFBkMppeKvViMEBEPyKqnyL1Gyrc9sJp1z8se38QxU';
        // 改用這個更直接的導出連結
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;

        async function loadData() {
            const status = document.getElementById('status');
            const list = document.getElementById('rankList');

            try {
                const response = await fetch(CSV_URL);
                const text = await response.text();
                
                // 檢查攞到嘅係咪真係 CSV 資料
                if (text.includes('<!DOCTYPE') || text.includes('google-signin')) {
                    throw new Error("權限不足！請喺 Google Sheet 撳「共用」並設為「知道連結的任何人」。");
                }

                // 拆開每一行，並處理 CSV 嘅引號
                const rows = text.split(/\r?\n/).map(row => 
                    row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim())
                );

                const header = rows[0]; // 第一行係名
                const playerNames = header.slice(2); // C 欄打後係人名
                const scoreboard = {};

                // 初始化每個玩家
                playerNames.forEach(name => {
                    if(name) scoreboard[name] = { sum: 0, games: 0 };
                });

                // 逐行計分 (由第二行開始)
                rows.slice(1).forEach(cols => {
                    playerNames.forEach((name, index) => {
                        const score = parseInt(cols[index + 2]);
                        if (!isNaN(score)) {
                            scoreboard[name].sum += score;
                            scoreboard[name].games += 1;
                        }
                    });
                });

                // 轉做 Array 並排序
                const sorted = Object.keys(scoreboard)
                    .map(name => ({ name, sum: scoreboard[name].sum, games: scoreboard[name].games }))
                    .sort((a, b) => b.sum - a.sum);

                status.innerText = "✅ 數據更新成功";

                // 渲染畫面
                list.innerHTML = sorted.map((p, i) => `
                    <div class="flex items-center justify-between p-5 border-b border-gray-50 last:border-0">
                        <div class="flex items-center gap-4">
                            <span class="text-lg font-black ${i < 3 ? 'text-amber-500' : 'text-gray-300'}">${i + 1}</span>
                            <div>
                                <div class="font-black text-gray-800 text-lg">${p.name}</div>
                                <div class="text-[9px] text-gray-400 font-bold uppercase">Mahjong Pro</div>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-xl font-black ${p.sum >= 0 ? 'text-emerald-600' : 'text-red-500'}">
                                ${p.sum > 0 ? '+' : ''}${p.sum}
                            </div>
                            <div class="text-[10px] text-gray-400 font-bold">${p.games} 局</div>
                        </div>
                    </div>
                `).join('');

            } catch (err) {
                status.innerText = "❌ 失敗";
                list.innerHTML = `<div class="p-10 text-center text-red-500 font-bold text-sm">${err.message}</div>`;
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
