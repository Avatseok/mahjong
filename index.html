<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🀄️ 雀王爭霸戰 2026 🀄️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@900&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        :root { --mj-green: #064e3b; --mj-tile: #fdfbf7; --mj-red: #b91c1c; }
        body { background-color: var(--mj-green); font-family: 'Noto Sans TC', sans-serif; background-image: radial-gradient(#065f46 2px, transparent 2px); background-size: 30px 30px; }
        .title-font { font-family: 'Noto Serif TC', serif; color: var(--mj-tile); text-shadow: 4px 4px 0px var(--mj-red); }
        .nav-btn { padding: 12px 24px; border-radius: 12px; color: white; font-weight: 900; cursor: pointer; transition: 0.3s; background: rgba(255,255,255,0.1); }
        .nav-btn.active { background: var(--mj-tile); color: var(--mj-green); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .tile-card { background: var(--mj-tile); border-bottom: 5px solid #d1d5db; border-right: 5px solid #d1d5db; border-radius: 12px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .score-pill { padding: 2px 10px; border-radius: 999px; font-size: 11px; font-weight: 900; }
        .win { background: #dcfce7; color: #166534; }
        .lose { background: #fee2e2; color: #991b1b; }
        .rank-row { border-left: 8px solid transparent; transition: 0.2s; }
        .rank-1 { border-left-color: #fbbf24; background: linear-gradient(90deg, #fef3c7, transparent); }
        .rank-2 { border-left-color: #94a3b8; background: linear-gradient(90deg, #f1f5f9, transparent); }
        .rank-3 { border-left-color: #d97706; background: linear-gradient(90deg, #ffedd5, transparent); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-5xl md:text-7xl title-font tracking-tighter mb-4">🀄️ 雀王爭霸戰 🀄️</h1>
            <p id="status" class="text-emerald-300 text-xs font-mono italic">DATA LOADING...</p>
        </header>

        <nav class="flex flex-wrap justify-center gap-3 mb-10 text-sm">
            <div class="nav-btn active" onclick="switchTab('tab1', this)">龍虎榜</div>
            <div class="nav-btn" onclick="switchTab('tab2', this)">名人堂</div>
            <div class="nav-btn" onclick="switchTab('tab3', this)">個人戰績</div>
            <div class="nav-btn" onclick="switchTab('tab4', this)">流水帳</div>
            <div class="nav-btn bg-red-800 hover:bg-red-700" onclick="switchTab('tab5', this)">➕ 新紀錄</div>
        </nav>

        <div id="tab1" class="tab-content active">
            <div class="flex justify-center flex-wrap gap-2 mb-8">
                <button class="year-btn px-5 py-2 rounded-full bg-emerald-900 text-white font-black text-xs" onclick="updateRank('all', this)">總排名</button>
                <button class="year-btn px-5 py-2 rounded-full bg-emerald-800 text-white font-black text-xs opacity-60" onclick="updateRank('2026', this)">2026</button>
                <button class="year-btn px-5 py-2 rounded-full bg-emerald-800 text-white font-black text-xs opacity-60" onclick="updateRank('2025', this)">2025</button>
                <button class="year-btn px-5 py-2 rounded-full bg-emerald-800 text-white font-black text-xs opacity-60" onclick="updateRank('2024', this)">2024</button>
            </div>
            <div class="tile-card bg-white overflow-hidden shadow-xl max-w-2xl mx-auto">
                <div id="rankContainer" class="divide-y divide-gray-100"></div>
            </div>
        </div>

        <div id="tab2" class="tab-content">
            <div id="hallGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

       <div id="tab3" class="tab-content">
    <div id="personalContainer" class="max-w-4xl mx-auto">
        <div id="personalHero"></div>
    </div>
</div>

        <div id="tab4" class="tab-content">
    <div class="max-w-2xl mx-auto mb-6 flex items-center justify-between bg-emerald-900/80 p-4 rounded-2xl border border-emerald-700 shadow-xl">
        <label class="text-white font-black text-sm italic">🔍 查閱個人流水帳：</label>
        <select id="logPlayerFilter" onchange="renderLogs()" class="bg-white text-emerald-900 font-bold py-2 px-4 rounded-xl text-sm outline-none">
            <option value="all">所有玩家 (All)</option>
        </select>
    </div>
    <div id="logsContainer" class="space-y-4 max-w-2xl mx-auto"></div>
</div>

        <div id="tab5" class="tab-content">
            <div class="max-w-xl mx-auto tile-card p-8 bg-white shadow-xl text-center">
                <h3 class="font-black text-emerald-900 mb-4 text-xl">如何新增紀錄？</h3>
                <p class="text-gray-500 text-sm mb-6 leading-relaxed">
                    本網站數據直接與 Google Sheets 同步。<br>
                    請直接前往 Excel 填寫新行，網頁重新整理後會自動更新！
                </p>
                <a href="https://docs.google.com/spreadsheets/d/15oFBkMppeKvViMEBEPyKqnyL1Gyrc9sJp1z8se38QxU" target="_blank" class="inline-block bg-emerald-900 text-white font-black px-8 py-3 rounded-xl">打開 Google Sheets</a>
            </div>
        </div>
    </div>

    <script>
    const getPlayerData = (name) => PLAYER_TITLES[name] || PLAYER_TITLES["Default"];
    let rawData = [];
    let playerStats = {};

    const formatName = (n) => n.trim().toLowerCase().charAt(0).toUpperCase() + n.trim().toLowerCase().slice(1);

    async function init() {
        try {
            const response = await fetch(URL);
            const csvText = await response.text();
            const rows = csvText.split(/\r?\n/).filter(r => r.trim() !== '');
            
            rawData = rows.slice(1).map(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim());
                return { date: cols[0], type: cols[1], scores: cols[2], year: cols[0] ? cols[0].split('-')[0] : "" };
            }).reverse();

            processData();
            
            const logSelect = document.getElementById('logPlayerFilter');
            if (logSelect) {
                logSelect.innerHTML = '<option value="all">所有玩家 (All)</option>';
                Object.keys(playerStats).sort().forEach(name => {
                    const opt = document.createElement('option');
                    opt.value = name;
                    opt.innerText = name;
                    logSelect.appendChild(opt);
                });
            }

            renderAll();
            document.getElementById('status').innerText = "✅ DATA SYNCHRONIZED";
        } catch (err) {
            document.getElementById('status').innerText = "❌ LOAD FAILED";
        }
    }

    // --- 修正 1：徹底重寫數據處理邏輯，修復括號錯位 ---
    function processData() {
        playerStats = {};
        // 為了計連勝，先做一個正序（由舊到新）的複本
        const timeSorted = [...rawData].sort((a, b) => new Date(a.date) - new Date(b.date));

        timeSorted.forEach(match => {
            const segments = match.scores.split(';');
            const mType = match.type.toLowerCase();

            segments.forEach(seg => {
                const parts = seg.trim().match(/^(.+?)\s+([+-]?\d+)$/);
                if (parts) {
                    const name = formatName(parts[1]);
                    const score = parseInt(parts[2]);

                    if (!playerStats[name]) {
                        playerStats[name] = { 
                            total: 0, games: 0, wins: 0, maxWin: 0, 
                            currentStreak: 0, maxStreak: 0,
                            yearly: {}, typeBreakdown: { 'hk': 0, 'tai': 0 }, 
                            buddies: {} 
                        };
                    }

                    const p = playerStats[name];
                    p.total += score;
                    p.games += 1;
                    if (score > 0) {
                        p.wins += 1;
                        p.currentStreak++;
                        if (p.currentStreak > p.maxStreak) p.maxStreak = p.currentStreak;
                    } else {
                        p.currentStreak = 0;
                    }
                    if (score > p.maxWin) p.maxWin = score;

                    if (!p.yearly[match.year]) p.yearly[match.year] = { score: 0, games: 0 };
                    p.yearly[match.year].score += score;
                    p.yearly[match.year].games += 1;

                    p.typeBreakdown[mType] = (p.typeBreakdown[mType] || 0) + score;

                    // 記錄對手（貴人/剋星）
                    segments.forEach(otherSeg => {
                        const oParts = otherSeg.trim().match(/^(.+?)\s+([+-]?\d+)$/);
                        if (oParts) {
                            const oName = formatName(oParts[1]);
                            if (oName !== name) {
                                p.buddies[oName] = (p.buddies[oName] || 0) + score;
                            }
                        }
                    });
                }
            });
        });
    }

    function switchTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    function updateRank(year, btn) {
        document.querySelectorAll('.year-btn').forEach(b => b.classList.add('opacity-60'));
        btn.classList.remove('opacity-60');
        renderRankTable(year);
    }

    function renderRankTable(year) {
        const container = document.getElementById('rankContainer');
        const sorted = Object.keys(playerStats).map(name => {
            let val, games;
            if (year === 'all') {
                val = playerStats[name].total;
                games = playerStats[name].games;
            } else {
                const yrData = playerStats[name].yearly[year] || { score: 0, games: 0 };
                val = yrData.score;
                games = yrData.games;
            }
            return { name, val, games };
        }).filter(p => p.games > 0).sort((a,b) => b.val - a.val);

        container.innerHTML = sorted.map((p, i) => {
            const info = getPlayerData(p.name);
            return `
                <div class="rank-row p-4 flex justify-between items-center bg-white ${i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':''}">
                    <div class="flex items-center gap-4">
                        <span class="w-6 font-black text-gray-400 italic text-sm">${i+1}</span>
                        <div class="text-2xl">${info.emoji}</div>
                        <div>
                            <p class="font-black text-emerald-900">${p.name}</p>
                            <p class="text-[9px] text-emerald-600 font-bold uppercase tracking-widest italic">${info.title}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-black text-sm ${p.val >= 0 ? 'text-emerald-600' : 'text-red-600'}">
                            ${p.val > 0 ? '+' : ''}${p.val}
                        </p>
                        <p class="text-[10px] text-gray-400 font-bold">${p.games} 局</p>
                    </div>
                </div>`;
        }).join('');
    }

    function renderHall() {
        const grid = document.getElementById('hallGrid');
        const sorted = Object.keys(playerStats)
            .map(name => ({ name, ...playerStats[name] }))
            .sort((a, b) => b.games - a.games);

        grid.innerHTML = sorted.map(p => {
            const info = getPlayerData(p.name);
            const winRate = ((p.wins / p.games) * 100).toFixed(1);
            const buddyEntries = Object.entries(p.buddies).sort((a, b) => b[1] - a[1]);
            const topBuddy = buddyEntries.length > 0 && buddyEntries[0][1] > 0 ? buddyEntries[0] : ["--", 0];
            const topNemesis = [...buddyEntries].reverse().find(e => e[1] < 0) || ["--", 0];

            return `
            <div onclick="viewPlayer('${p.name}')" class="tile-card cursor-pointer bg-white p-5 shadow-sm flex flex-col border-l-8 border-emerald-500 hover:shadow-md transition-all">
                <div class="flex items-center gap-4 mb-4">
                    <div class="text-4xl">${info.emoji}</div>
                    <div>
                        <h3 class="text-xl font-black text-emerald-900">${p.name}</h3>
                        <p class="text-[10px] font-bold text-emerald-600 uppercase tracking-widest">${info.title}</p>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div class="bg-emerald-900 text-white p-3 rounded-xl"><p class="text-[9px] opacity-70">累積盈虧</p><p class="text-lg font-black">${p.total > 0 ? '+' : ''}${p.total}</p></div>
                    <div class="bg-amber-500 text-white p-3 rounded-xl"><p class="text-[9px] opacity-70">最高連勝</p><p class="text-lg font-black">${p.maxStreak} 局</p></div>
                </div>
                <div class="space-y-2 border-t pt-4 text-[11px] font-bold">
                    <div class="flex justify-between"><span>💎 貴人</span><span>${topBuddy[0]} (+${topBuddy[1]})</span></div>
                    <div class="flex justify-between"><span>💀 剋星</span><span>${topNemesis[0]} (${topNemesis[1]})</span></div>
                </div>
            </div>`;
        }).join('');
    }

    function renderLogs() {
        const container = document.getElementById('logsContainer');
        const filterPlayer = document.getElementById('logPlayerFilter')?.value || 'all';
        const dataToRender = filterPlayer === 'all' ? rawData.slice(0, 20) : rawData.filter(l => l.scores.includes(filterPlayer));

        container.innerHTML = dataToRender.map(l => {
            const isHK = l.type.toLowerCase() === 'hk';
            const scoresHtml = l.scores.split(';').map(s => {
                const isHighlight = filterPlayer !== 'all' && s.includes(filterPlayer);
                const scoreNum = parseInt(s.match(/[+-]?\d+/));
                return `<div class="flex justify-between px-3 py-1 rounded ${isHighlight ? 'bg-emerald-100 ring-1 ring-emerald-500' : 'bg-gray-50'}">
                    <span class="text-[11px]">${s.trim().split(' ')[0]}</span>
                    <span class="text-[11px] font-black ${scoreNum >= 0 ? 'text-emerald-600' : 'text-red-600'}">${scoreNum > 0 ? '+' : ''}${scoreNum}</span>
                </div>`;
            }).join('');
            return `<div class="tile-card p-5 bg-white border-t-4 ${isHK ? 'border-t-blue-500' : 'border-t-amber-500'}">
                <div class="flex justify-between mb-4"><span class="text-sm font-black">${l.date}</span><span class="text-[10px] px-2 py-1 rounded bg-gray-100">${l.type}</span></div>
                <div class="grid grid-cols-2 gap-2">${scoresHtml}</div>
            </div>`;
        }).join('');
    }

    // --- 修正 2：統一後的個人戰績繪製函數 ---
    function renderPersonal(targetName = 'Ava') {
        const container = document.getElementById('personalHero');
        const p = playerStats[targetName];
        if (!p) return;

        const info = getPlayerData(targetName);
        const buddyList = Object.entries(p.buddies).sort((a, b) => b[1] - a[1]).slice(0, 3);
        const nemesisList = Object.entries(p.buddies).sort((a, b) => a[1] - b[1]).slice(0, 3);

        container.innerHTML = `
            <div class="flex items-center gap-4 mb-8 bg-white p-6 rounded-3xl shadow-sm border-l-8 border-emerald-500">
                <div class="text-6xl">${info.emoji}</div>
                <div>
                    <h2 class="text-3xl font-black text-emerald-900">${targetName}</h2>
                    <p class="text-sm font-bold text-emerald-600 uppercase tracking-widest">${info.title}</p>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="tile-card p-6 text-center bg-white">
                    <p class="text-xs font-black text-gray-400 mb-2 uppercase">總盈虧</p>
                    <p class="text-5xl font-black ${p.total >= 0 ? 'text-emerald-600' : 'text-red-600'}">${p.total > 0 ? '+' : ''}${p.total}</p>
                </div>
                <div class="md:col-span-2 tile-card p-6 bg-white">
                    <h3 class="font-black text-emerald-900 mb-4 border-b pb-2">📅 年度戰報</h3>
                    <div class="grid grid-cols-3 gap-2">
                        ${['2026', '2025', '2024'].map(yr => `
                            <div class="text-center p-3 bg-gray-50 rounded-xl">
                                <p class="text-[10px] text-gray-400">${yr}</p>
                                <p class="text-xl font-black ${(p.yearly[yr]?.score || 0) >= 0 ? 'text-emerald-600' : 'text-red-600'}">
                                    ${(p.yearly[yr]?.score || 0) > 0 ? '+' : ''}${(p.yearly[yr]?.score || 0)}
                                </p>
                            </div>`).join('')}
                    </div>
                </div>
                <div class="tile-card p-6 bg-white">
                    <h3 class="font-black text-emerald-900 mb-4 border-b pb-2">🀄 玩法盈虧</h3>
                    <div class="space-y-2">
                        <div class="flex justify-between bg-blue-50 p-2 rounded text-xs font-bold"><span>廣東</span><span>${p.typeBreakdown['hk'] || 0}</span></div>
                        <div class="flex justify-between bg-amber-50 p-2 rounded text-xs font-bold"><span>台牌</span><span>${p.typeBreakdown['tai'] || 0}</span></div>
                    </div>
                </div>
                <div class="tile-card p-6 bg-white">
                    <h3 class="font-black text-emerald-900 mb-4 border-b pb-2">💎 貴人</h3>
                    <div class="space-y-1 text-xs font-bold">
                        ${buddyList.map(b => `<div class="flex justify-between"><span>${b[0]}</span><span class="text-emerald-500">+${b[1]}</span></div>`).join('')}
                    </div>
                </div>
                <div class="tile-card p-6 bg-white">
                    <h3 class="font-black text-emerald-900 mb-4 border-b pb-2">💀 剋星</h3>
                    <div class="space-y-1 text-xs font-bold">
                        ${nemesisList.map(n => `<div class="flex justify-between"><span>${n[0]}</span><span class="text-red-500">${n[1]}</span></div>`).join('')}
                    </div>
                </div>
            </div>`;
    }

    function viewPlayer(name) {
        renderPersonal(name); 
        const personalBtn = document.querySelectorAll('.nav-btn')[2]; 
        switchTab('tab3', personalBtn);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderAll() {
        renderRankTable('all');
        renderHall();
        renderLogs();
        renderPersonal(); 
    }

    window.onload = init;
    </script>
</body>
</html>
