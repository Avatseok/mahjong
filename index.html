<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雀王排行榜 - 偵察模式</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#064e3b] p-4 text-white">

    <div class="max-w-md mx-auto">
        <header class="text-center py-6">
            <h1 class="text-3xl font-black italic">🀄 雀王排行榜</h1>
            <p id="status" class="text-emerald-400 text-[10px] mt-2 font-mono uppercase">連接成功，正在檢查格式...</p>
        </header>

        <div id="board" class="bg-white rounded-3xl shadow-xl overflow-hidden text-gray-800 mb-6">
            <div class="p-10 text-center text-gray-400">數據分析中...</div>
        </div>

        <div class="p-4 bg-black/40 rounded-xl border border-white/10">
            <p class="text-xs font-bold mb-2 text-yellow-400">🔍 原材料預覽 (Debug)：</p>
            <div id="raw-debug" class="text-[9px] font-mono whitespace-pre-wrap break-all opacity-70">等待數據中...</div>
        </div>
    </div>

    <script>
        const SHEET_ID = '15oFBkMppeKvViMEBEPyKqnyL1Gyrc9sJp1z8se38QxU';
        const GID = '719393887';
        const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

        async function probeData() {
            const status = document.getElementById('status');
            const board = document.getElementById('board');
            const debug = document.getElementById('raw-debug');

            try {
                const response = await fetch(URL);
                const csvText = await response.text();
                
                // 將頭兩行印喺畫面度睇睇
                const lines = csvText.split('\n');
                debug.innerText = "LINE 1: " + lines[0] + "\n\nLINE 2: " + (lines[1] || "EMPTY");

                // 分解數據
                const rows = csvText.split(/\r?\n/).map(row => 
                    row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim())
                );

                const header = rows[0];
                const playerNames = header.slice(2); // C 欄打後
                
                let stats = {};
                playerNames.forEach(name => { if(name) stats[name] = { total: 0, games: 0 }; });

                rows.slice(1).forEach(cols => {
                    playerNames.forEach((name, i) => {
                        // 強制清除所有非數字字元 (例如 $ 或 ,)
                        const rawVal = cols[i + 2] || "";
                        const cleanVal = rawVal.replace(/[^\d-]/g, '');
                        const val = parseInt(cleanVal);
                        
                        if (!isNaN(val)) {
                            stats[name].total += val;
                            stats[name].games += 1;
                        }
                    });
                });

                const sorted = Object.keys(stats)
                    .map(name => ({ name, score: stats[name].total, games: stats[name].games }))
                    .sort((a, b) => b.score - a.score);

                if (sorted.length === 0) {
                    board.innerHTML = "<div class='p-10 text-center text-gray-400'>讀到文件，但搵唔到對局數據。</div>";
                } else {
                    status.innerText = "✅ 數據已更新";
                    board.innerHTML = sorted.map((p, i) => `
                        <div class="flex justify-between p-5 border-b border-gray-50 last:border-0">
                            <div class="flex items-center gap-3">
                                <span class="font-bold ${i<3?'text-amber-500':'text-gray-300'}">${i+1}</span>
                                <span class="font-bold text-gray-800">${p.name}</span>
                            </div>
                            <div class="text-right">
                                <div class="font-black ${p.score >= 0 ? 'text-emerald-600' : 'text-red-500'}">${p.score > 0 ? '+' : ''}${p.score}</div>
                                <div class="text-[9px] text-gray-400">${p.games} 局</div>
                            </div>
                        </div>
                    `).join('');
                }

            } catch (err) {
                status.innerText = "❌ 發生錯誤";
                debug.innerText = err.message;
            }
        }

        window.onload = probeData;
    </script>
</body>
</html>
